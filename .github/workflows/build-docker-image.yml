name: Create and publish a Docker image

on:
  push:
    branches:
      - "main"
      - "test"
      - "gh-pages"

jobs:
  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # forge25 統合: Z-Image(diffusers) 同居のため torch 2.5.1 + cu124 固定。
          # Dockerfile が torchaudio==2.5.1+cu124 を決め打ち force-reinstall するため
          # 当面 12.4.0(cu124) の1系統のみ。cu121 系は torchaudio をパラメータ化して
          # Z-Image を cu121/torch2.3.1 で実検証できたら 12.1.0 行を戻す。
          - cuda_version: 12.4.0
            pytorch_version: 2.5.1
    env:
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - name: checkout
        uses: actions/checkout@v2

      - name: Adjutment docker volumes
        run: |
          docker system df
          docker system prune -a --volumes -f
          docker system df
          df

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::6}" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          build-args: |
            CUDA_VERSION=${{ matrix.cuda_version }}
            PYTORCH_VERSION=${{ matrix.pytorch_version }}
          tags: |
            ${{ github.repository }}:${{ matrix.cuda_version }}-${{ env.SHORT_SHA }}
            ${{ github.repository }}:${{ matrix.cuda_version }}
          cache-from: type=registry,ref=${{ github.repository }}:cache-${{ matrix.cuda_version }}
          cache-to: type=registry,ref=${{ github.repository }}:cache-${{ matrix.cuda_version }},mode=max

